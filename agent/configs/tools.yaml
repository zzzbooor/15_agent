default_toolset: basic_tools

settings:
  data_root: ../data
  limits_config: skill_limits.yaml
  schema_source: function

toolsets:
  basic_tools:
    - calculator
    - file_reader
    - local_file_search
    - table_analyzer
    - format_converter
  advanced_tools:
    - calculator
    - file_reader
    - local_file_search
    - table_analyzer
    - format_converter
    - read_and_convert
    - analyze_and_convert
    - code_executor

tools:
  calculator:
    module: skills.calculator
    function: calculator
    cacheable: true
    description: Calculate a safe arithmetic expression.
    parameters:
      expression:
        type: string
        description: Arithmetic expression using numbers and supported operators.
    required: [expression]
    returns:
      result:
        type: number
        description: Calculated value.

  file_reader:
    module: skills.file_reader
    function: file_reader
    cacheable: false
    description: Read a local UTF-8 txt or md file from the data directory.
    parameters:
      path:
        type: string
        description: Path relative to the configured data root.
      max_chars:
        type: integer
        description: Maximum number of characters to return.
    required: [path]
    returns:
      content: {type: string, description: File content.}
      num_chars: {type: integer, description: Returned character count.}
      source: {type: string, description: Normalized path relative to data root.}
      truncated: {type: boolean, description: Whether content was truncated.}
      size_bytes: {type: integer, description: Source file size in bytes.}
      applied_max_chars: {type: integer, description: Effective configured character cap.}

  local_file_search:
    module: skills.local_file_search
    function: local_file_search
    cacheable: false
    description: Search local txt and md files with Unicode-aware BM25 ranking and positive-score filtering.
    parameters:
      query: {type: string, description: Search query.}
      root_dir: {type: string, description: Directory relative to data root.}
      file_types:
        type: array
        items: {type: string}
        description: File extensions to search.
      top_k: {type: integer, description: Maximum number of matches.}
    required: [query]
    returns:
      results: {type: array, description: "Ranked paths, snippets, and scores."}
      total_scanned: {type: integer, description: Candidate files inspected.}
      indexed_files: {type: integer, description: Files admitted to the index.}
      total_bytes: {type: integer, description: Total indexed source bytes.}
      indexed_tokens: {type: integer, description: Total tokens retained for ranking.}
      entries_seen: {type: integer, description: Directory entries visited by the streaming walker.}
      timed_out: {type: boolean, description: Whether the search deadline was reached.}
      limit_reached: {description: "Resource budget that stopped indexing, or null."}
      skipped_files: {type: array, description: Bounded file-level error records.}
      query_terms: {type: array, description: Normalized searchable query terms.}
      applied_top_k: {type: integer, description: Effective capped result count.}

  table_analyzer:
    module: skills.table_analyzer
    function: table_analyzer
    cacheable: false
    description: Analyze a local CSV or TSV file.
    parameters:
      path: {type: string, description: Table path relative to data root.}
      max_rows_preview: {type: integer, description: Number of preview rows.}
      describe: {type: boolean, description: Whether to calculate numeric statistics.}
    required: [path]
    returns:
      num_rows: {type: integer, description: Data row count.}
      num_columns: {type: integer, description: Column count.}
      columns: {type: array, description: Column names.}
      preview: {type: array, description: First rows.}
      describe: {type: object, description: Numeric statistics by column.}
      path: {type: string, description: Normalized source table path.}
      truncated: {type: boolean, description: Whether the configured row budget stopped reading.}
      size_bytes: {type: integer, description: Source table size in bytes.}
      applied_max_rows_preview: {type: integer, description: Effective preview-row cap.}

  format_converter:
    module: skills.format_converter
    function: format_converter
    cacheable: false
    description: Convert text to markdown bullets or formatted JSON and write the converted content to a file.
    parameters:
      text: {type: string, description: Input text.}
      target_format: {type: string, description: markdown or json.}
      output_filename: {type: string, description: Optional output filename. Defaults to converted.md or converted.json.}
    required: [text, target_format]
    returns:
      formatted_text: {type: string, description: Converted text.}
      generated_file_path: {type: string, description: Path of the generated output file.}
      target_format: {type: string, description: Normalized target format.}
      output_bytes: {type: integer, description: UTF-8 size of the generated output.}

  read_and_convert:
    module: skills.composite_skills
    function: read_and_convert
    cacheable: false
    description: Composite skill that reads a local txt/md file and converts its content to markdown or JSON.
    parameters:
      path: {type: string, description: File path relative to data root.}
      target_format: {type: string, description: markdown or json.}
      max_chars: {type: integer, description: Maximum characters to read before conversion.}
    required: [path, target_format]
    returns:
      composite_name: {type: string, description: Composite skill name.}
      steps: {type: array, description: Executed step names.}
      final_output: {type: string, description: Converted content.}
      step_results: {type: object, description: Outputs of every component Skill.}
      step_trace: {type: array, description: Per-step status and latency records.}
      generated_file_path: {type: string, description: Generated report path.}

  analyze_and_convert:
    module: skills.composite_skills
    function: analyze_and_convert
    cacheable: false
    description: Composite skill that analyzes a CSV/TSV table and converts the analysis report.
    parameters:
      path: {type: string, description: Table path relative to data root.}
      target_format: {type: string, description: markdown or json.}
      max_rows_preview: {type: integer, description: Number of preview rows.}
      describe: {type: boolean, description: Whether to calculate numeric statistics.}
    required: [path, target_format]
    returns:
      composite_name: {type: string, description: Composite skill name.}
      steps: {type: array, description: Executed step names.}
      final_output: {type: string, description: Converted report.}
      generated_file_path: {type: string, description: Generated report path.}
      step_results: {type: object, description: Outputs of every component Skill.}
      step_trace: {type: array, description: Per-step status and latency records.}

  code_executor:
    module: skills.code_executor
    function: code_executor
    cacheable: false
    description: Execute short Python code in a restricted local sandbox with import, time, memory, and output limits.
    parameters:
      code: {type: string, description: Python code to execute.}
      timeout: {type: integer, description: Timeout seconds capped by the sandbox.}
    required: [code]
    returns:
      returncode: {type: integer, description: Process return code.}
      stdout: {type: string, description: Captured standard output.}
      stderr: {type: string, description: Captured standard error.}
      execution_time_ms: {type: number, description: Execution latency.}
      killed: {type: boolean, description: Whether the process was killed.}
      engine: {type: string, description: Restricted interpreter implementation.}
      operations: {type: integer, description: Counted AST operations.}
      loop_iterations: {type: integer, description: Counted loop iterations.}
      isolation: {type: object, description: Isolated-mode, privilege and effective UID evidence.}
      limits: {type: object, description: Effective execution resource limits.}
